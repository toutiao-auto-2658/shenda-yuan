<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沈家大院专属</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
    body { background: #121212; color: #fff; }
    .header { background: #1e1e1e; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 22px; font-weight: bold; color: #ff4d4f; }
    .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
    .tab { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-item { padding: 10px 20px; background: #2a2a2a; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
    .tab-item.active { background: #ff4d4f; }
    .content { display: none; }
    .content.active { display: block; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    .item { background: #1e1e1e; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s; }
    .item:hover { transform: scale(1.05); }
    .item img { width: 100%; height: 260px; object-fit: cover; }
    .item-title { padding: 10px; font-size: 14px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">沈家大院专属</div>
  </div>
  <div class="container">
    <div class="tab">
      <div class="tab-item active" data-tab="movie">影视专区</div>
      <div class="tab-item" data-tab="novel">小说专区</div>
      <div class="tab-item" data-tab="live">直播专区</div>
    </div>
    <div class="content active" id="movie"></div>
    <div class="content" id="novel"></div>
    <div class="content" id="live"></div>
  </div>

  <script>
    // 加载你的专属配置
    const configUrl = "https://cdn.jsdelivr.net/gh/toutiao-auto-2658/shenda-yuan/tj.json";
    fetch(configUrl)
      .then(res => res.json())
      .then(config => {
        // 影视专区渲染
        document.getElementById("movie").innerHTML = `<div style="text-align:center; padding:50px; font-size:18px;">影视源加载中...</div>`;
        // 小说专区渲染
        document.getElementById("novel").innerHTML = `<div style="text-align:center; padding:50px; font-size:18px;">小说源加载中...</div>`;
        // 直播专区渲染
        document.getElementById("live").innerHTML = `<div style="text-align:center; padding:50px; font-size:18px;">直播源加载中...</div>`;
        
        // 标签切换逻辑
        document.querySelectorAll(".tab-item").forEach(tab => {
          tab.addEventListener("click", () => {
            document.querySelectorAll(".tab-item").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
            tab.classList.add("active");
            document.getElementById(tab.dataset.tab).classList.add("active");
          });
        });
      })
      .catch(err => {
        alert("配置加载失败，请检查网络");
        console.error(err);
      });
  </script>
</body>
</html>
